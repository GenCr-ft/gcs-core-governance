# Agent Lexicon — Core Studio Vocabulary
# Extracted from GOV-GUIDE-412: Studio Reference — Core Lexicon & Capabilities
# Source: execution-manuals/onboard-manuals/grounding-docs/GOV-GUIDE-412.studio-reference-core-lexicon--capabilities.md

_meta:
  docId: GOV-GUIDE-HG-AC-004
  title: Agent Lexicon
  version: 1.1.0
  metadata:
    lifecycle-stage: approved
    intended-audience: [ai-agents]
    security-classification: l2_confidential
