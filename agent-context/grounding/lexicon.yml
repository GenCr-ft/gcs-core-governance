# Agent Lexicon — Core Studio Vocabulary
# Extracted from GOV-GUIDE-412: Studio Reference — Core Lexicon & Capabilities
# Source: execution-manuals/onboard-manuals/grounding-docs/GOV-GUIDE-412.studio-reference-core-lexicon--capabilities.md

_meta:
  docId: GOV-REFE-004
  title: Agent Lexicon
  version: 1.1.0
  metadata:
    lifecycle-stage: approved
    intended-audience: [ai-agents]
    security-classification: l2_confidential
    source_version: "1.0.0"
    last_verified: "2026-06-27"
    source: GOV-GUIDE-412 §2

terms:
  - term: Gemma
    definition: "The GEM instantiation agent. Injects GemID, role title, and core mission context into a Gem at the start of each session. All Gems receive their operational identity via Gemma."
    gemId: "GCT-UTL-GGEN-001"
    source: "GOV-GUIDE-006 GASAI v2.0"

  - term: SSoT
    definition: "Single Source of Truth — for any given piece of official information, there is one authoritative location, always a version-controlled document in a Gencraft Git repository."
    source: "GOV-GUIDE-412 §2"

  - term: AI Gem
    definition: "A specialized AI entity within Gencraft Studio, designed to perform specific roles and tasks. Also called 'Gem'."
    source: "GOV-GUIDE-412 §2"

  - term: GOP
    definition: "Global Operational Protocol — studio-wide operational protocol in 01-operational-protocols/, applies to all Gencraft members (e.g., S1, S2, S8)."
    source: "GOV-GUIDE-412 §2"

  - term: CSP
    definition: "Crew-Specific Protocol — documented local adaptation of a GOP, applies only within a particular Crew, as defined in Protocol S12."
    source: "GOV-GUIDE-412 §2"

  - term: Knowledge Guardian
    definition: "A designated Gem responsible for the quality, accuracy, and currency of a specific knowledge domain within the SSoT. Abbreviated KG."
    source: "GOV-GUIDE-412 §2"

  - term: ADR
    definition: "Architecture Decision Record — document capturing an important architectural decision, its context, and consequences."
    source: "GOV-GUIDE-412 §2"

  - term: Crew
    definition: "A functional group of Gems orchestrated by the CrewAI framework to collaborate on complex tasks."
    source: "GOV-GUIDE-412 §2"

  - term: MCP
    definition: "Model Context Protocol — open standard Gencraft uses to standardize all interactions between Gems (as MCP Clients) and their Tools (exposed via MCP Servers)."
    source: "GOV-GUIDE-412 §2"

  - term: DoD
    definition: "Definition of Done — shared mandatory checklist of criteria a work item must meet to be considered complete. Document: PRO-STAN-001."
    source: "GOV-GUIDE-412 §2"

  - term: NFR
    definition: "Non-Functional Requirement — criteria used to judge the operation of a system (performance, security, usability), rather than specific behaviors."
    source: "GOV-GUIDE-412 §2"

  - term: IaC
    definition: "Infrastructure as Code — managing and provisioning infrastructure through machine-readable definition files (OpenTofu). Repo prefix: gci-* (e.g., gencraft-iac)."
    source: "GOV-GUIDE-412 §2"

  - term: CI/CD
    definition: "Continuous Integration / Continuous Delivery — automated processes for building, testing, and releasing software. See gcd-shared-actions for reusable workflows."
    source: "GOV-GUIDE-412 §2"

  - term: PR
    definition: "Pull Request — standard mechanism for proposing changes to any SSoT repository. All significant changes must be submitted via PR."
    source: "GOV-GUIDE-412 §2"

  - term: WI
    definition: "Work Item — a GitHub Issue tracking a single deliverable, governed by the 5-gate lifecycle in GOV-PROT-003."
    source: "gcs-core-governance/GOV-PROT-003.wi-lifecycle-contract.md"

  - term: title_kebab_case
    definition: "A path-template variable that resolves to the document title transformed to lowercase, with spaces and underscores replaced by hyphens, and all non-alphanumeric punctuation removed. Example: 'On-Boarding Guide' → 'on-boarding-guide'. Used in KNOWLEDGE_HANDBOOK_STORAGE target_path_template."
    source: "config-engines/metadata-schemas/storage-rules.yml (KNOWLEDGE_HANDBOOK_STORAGE)"

  - term: spec_refs
    definition: "Specification references — the set of Markdown links present in a WI issue body's `## Relations` section that point to documents (in any Gencraft repository) whose YAML frontmatter contains a `lifecycle-stage:` field. An agent evaluates spec_refs by: (1) parsing every hyperlink in `## Relations`; (2) fetching the target document; (3) reading its `metadata.lifecycle-stage` frontmatter field. A spec_ref is considered 'approved' when its `lifecycle-stage` value is exactly `approved`. Values of `draft`, `proposed`, or an absent frontmatter field are non-approved. The blocker `spec_refs_with_lifecycle_stage: [\"draft\", \"proposed\", \"absent\"]` fails (hard-block at CREATE) when any linked spec document matches one of those states. The additional_check `spec_refs_still_approved: true` fails (advisory at REFINE) when any previously-approved spec has been demoted below `approved`."
    source: "gcs-core-governance/agent-context/protocols/wi-lifecycle-gates.yml"

  - term: redirect (->)
    definition: "Notation used in rules-index.md to indicate that the canonical SSoT for the named file lives in reference-libraries/ but a surfaced read-accessible copy is maintained at the path given by the enclosing section header (e.g. config-engines/metadata-schemas/). Agents must read the copy at the surfaced path, never the reference-libraries/ original."
    source: "gcs-core-governance/agent-context/rules-index.md"

  - term: GemID
    definition: "Unique identifier for an AI Gem. Format: GCT-{DEPT}-{ROLE}-{NNN}. Example: GCT-PRG-SARCH-001 (Isaac, Senior Architect)."
    source: "gcs-plt-gembp repo"

  - term: nb
    definition: "Non-blank lines — a count of lines that do not match the pattern ^\\s*$ (i.e., lines containing at least one non-whitespace character). Computed via: grep -cv '^\\s*$' <file>. Used as the unit for compression thresholds: CLAUDE.md ≤200 nb, AGENTS.md ≤150 nb."
    source: "gcs-core-governance tools/verify-compression.sh"

  - term: spec_ref
    definition: "A specification document linked or referenced in a Work Item's body. Qualifying documents are: any GitHub Issue or file whose title or path starts with a recognized spec prefix (ENG-SPEC-, GAM-SPEC-, GOV-SPEC-, or equivalent docId patterns), or any issue explicitly labelled 'spec'. To evaluate a spec_ref's lifecycle-stage: read the YAML frontmatter field `metadata.lifecycle-stage` of the linked document; if the document has no frontmatter or is a GitHub Issue, read the issue label whose name starts with 'lifecycle:' (e.g. lifecycle:draft, lifecycle:proposed, lifecycle:approved). A spec_ref is considered 'absent' when no qualifying reference exists in the WI body. The create-phase blocker spec_refs_with_lifecycle_stage blocks a WI if any linked spec_ref has a lifecycle-stage matching one of the listed values (['draft', 'proposed', 'absent']). The refine-phase check spec_refs_still_approved passes only when every linked spec_ref retains lifecycle-stage 'approved' at the time of evaluation."
    source: "GOV-PROT-003.wi-lifecycle-contract.md §Spec Reference Contract"
