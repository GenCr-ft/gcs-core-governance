# Gencraft Studio Governance Scopes Catalog
# Version: 1.0.0
# Date: 2026-06-01
# This file is the SSoT registry for official governance scopes discovered by tooling.

governance_scopes:
  - id: "studio-global"
    description: "Global studio governance law applied by default to all GenCr@ft repositories."
    metadata:
      source: "global"
      scope: "studio"
      repository_id: "gcs-core-governance"
      governance_root: "foundations/governance"
      precedence: 100
      applies_to:
        - repository_pattern: "*"
      law_paths:
        vocabularies: "foundations/governance/vocabularies/"
        catalogs: "foundations/governance/catalogs/"
        rules: "foundations/governance/rules/"
        schemas: "foundations/governance/schemas/"
