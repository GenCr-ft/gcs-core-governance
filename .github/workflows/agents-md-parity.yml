name: AGENTS.md parity check

on:
  pull_request:
    paths:
      - 'AGENTS.md'
      - 'scripts/verify_agents_md_parity.py'
      - 'config-engines/metadata-schemas/storage-rules.yml'
      - 'agent-context/**'
      - 'human-guides/**'
  push:
    branches: [main]
    paths:
      - 'AGENTS.md'
      - 'scripts/verify_agents_md_parity.py'
      - 'config-engines/metadata-schemas/storage-rules.yml'
      - 'agent-context/**'
      - 'human-guides/**'

jobs:
  agents-md-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify AGENTS.md link targets and source_version pin
        run: python3 scripts/verify_agents_md_parity.py
